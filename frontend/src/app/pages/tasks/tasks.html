<div class="dashboard">
  <div class="sidebar">
    <div class="sidebar-logo">
      <span>⚡</span>
      <h2>LBTC</h2>
    </div>
    <nav class="sidebar-nav">
      <a [routerLink]="['/dashboard']" class="nav-item"> Dashboard</a>
      <a [routerLink]="['/tasks']" class="nav-item active"> Tareas</a>
      <a [routerLink]="['/users']" class="nav-item">👥 Usuarios</a>
      <a [routerLink]="['/logs']" class="nav-item">Logs</a>  

    </nav>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Tareas </h1>
      <p>Crea y gestiona tus tareas</p>
    </div>

    <!-- Formulario agregar -->
    <div class="task-form">
  <input class="form-input" [(ngModel)]="title" placeholder="Título de la tarea" />
  <input class="form-input" [(ngModel)]="description" placeholder="Descripción (opcional)" />
  <select class="form-input" [(ngModel)]="priority">
    <option [ngValue]="false">Normal</option>
    <option [ngValue]="true">Alta prioridad </option>
  </select>
  <button class="btn-add" (click)="addTask()">+ Agregar</button>
</div>

    <!-- Lista de tareas -->
    <div class="task-list">
      <div class="task-card" *ngFor="let task of tasks">

        <!-- Modo edición -->
        <div *ngIf="editingTask?.id === task.id" class="edit-mode">
  <input class="form-input" [(ngModel)]="editingTask.name" placeholder="Título" />
  <input class="form-input" [(ngModel)]="editingTask.description" placeholder="Descripción" />
  <div class="edit-actions">
    <button class="btn-save" (click)="saveEdit()">💾 Guardar</button>
    <button class="btn-cancel" (click)="cancelEdit()">✕ Cancelar</button>
  </div>
</div>

        <!-- Modo vista -->
        <!-- Modo vista -->
<div *ngIf="editingTask?.id !== task.id" class="view-mode">
  <div class="task-info">
    <h4>{{ task.name }} <span class="badge" *ngIf="task.priority"> Alta</span></h4>
    <p>{{ task.description }}</p>
  </div>
  <div class="task-actions">
    <button class="btn-edit" (click)="startEdit(task)">✏️</button>
    <button class="btn-delete" (click)="deleteTask(task.id)">🗑️</button>
  </div>
</div>

      </div>

      <div class="empty" *ngIf="tasks.length === 0">
        No tienes tareas aún. ¡Crea una! 🚀
      </div>
    </div>
  </div>
</div>
